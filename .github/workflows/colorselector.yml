name: passing job values

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  
jobs:
  pass_in_one_job:
    runs-on: ubuntu-latest
    steps:
      - name: Set color
        id: color-selector
        run: echo "SELECTED_COLOR=green" >> "$GITHUB_OUTPUT" # ⬅️Here we set the variable SELECTED_COLOR. For the step `color-selector` the variable name is `SELECTED_COLOR`
      - name: Get color
        env:
          COLOR: ${{ steps.color-selector.outputs.SELECTED_COLOR }} # ⬅️Here we reference the variable name as seen by the step
        run: echo "The selected color is $COLOR"
